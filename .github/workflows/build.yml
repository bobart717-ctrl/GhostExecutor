name: GhostBuild

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Это позволит запустить сборку кнопкой вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      run: |
        msbuild GhostExecutor.sln /p:Configuration=Release /p:Platform="x64"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Ghost-Final-Build
        path: |
          **/Release/*.exe
          **/Release/*.dll
